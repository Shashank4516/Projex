pluginManagement {
	repositories {
		gradlePluginPortal()
		mavenCentral()
	}
}

// Auto-download JDK matching java.toolchains (Railway/Railpack often only ships Java 21).
plugins {
	// 1.0.0+ required for Gradle 9 (0.x referenced removed JvmVendorSpec.IBM_SEMERU).
	id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
}

rootProject.name = 'projex-api'
