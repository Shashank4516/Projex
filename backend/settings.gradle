pluginManagement {
	repositories {
		gradlePluginPortal()
		mavenCentral()
	}
}

// Optional: auto-download JDK if the host JVM does not satisfy java.toolchains in build.gradle.
plugins {
	// 1.0.0+ required for Gradle 9 (0.x referenced removed JvmVendorSpec.IBM_SEMERU).
	id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
}

rootProject.name = 'projex-api'
